<!DOCTYPE html>
<html>

<head>
<title>Mini Online Judge</title>

<style>

body{
font-family: Arial;
background:#f0f2f5;
margin:0;
padding:0;
}

.container{
width:800px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input[type=file]{
margin:10px 0;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Mini Online Judge</h1>

<form action="/submit" method="post" enctype="multipart/form-data">

<h3>Upload Code C++</h3>
<input type="file" name="code" required>

<h3>Select Test Folder</h3>
<input type="file" name="tests" webkitdirectory directory multiple required>

<br><br>

<button type="submit">Run Tests</button>

</form>

{% if score is defined %}

<h2>Score: {{score}} / {{total}}</h2>

<table>

<tr>
<th>Testcase</th>
<th>Result</th>
</tr>

{% for t in results %}

<tr>
<td>{{t[0]}}</td>

<td class="{% if t[1]=='PASS' %}pass{% else %}fail{% endif %}">
{{t[1]}}
</td>

</tr>

{% endfor %}

</table>

{% endif %}

</div>

</body>
</html>
